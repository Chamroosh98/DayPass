name: DayPass Auto Package Pipeline

on:
  push:
    branches: [ "main", "master" ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build-and-sign:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Source
        uses: actions/checkout@v4

      - name: Install Official Build Tools & Build Usign
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl build-essential cmake

          # راهکار رسمی: کلون کردن و کامپایل سریع نیتیو usign بدون وابستگی به باینری خراب
          git clone https://git.openwrt.org/project/usign.git
          cd usign
          cmake .
          make
          sudo cp usign /usr/local/bin/usign
          cd .. && rm -rf usign

          echo "Verifying official usign installation:"
          usign

      - name: Make Scripts Executable
        run: |
          chmod +x core/*.sh ui/*.sh

      - name: Run DayPass Orchestrator
        run: |
          ./core/orchestrator.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}