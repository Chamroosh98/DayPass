name: DayPass Auto Package Pipeline

on:
  push:
    branches: [ "main", "master" ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build-and-sign:
    runs-on: ubuntu-latest # برگشت به اوبونتو برای پایداری ۱۰۰ درصد ابزارها

    steps:
      - name: Checkout Repository Source
        uses: actions/checkout@v4

      - name: Install Tools & Fetch Static Usign
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl
          
          # دانلود نسخه از پیش کامپایل شده و استاتیک usign برای لینوکس 64 بیتی
          mkdir -p bin
          curl -sL https://github.com/openwrt/usign/releases/download/v1/usign-linux-x64 -o bin/usign || \
          curl -sL https://raw.githubusercontent.com/tuanvinh/usign-static/master/usign -o bin/usign
          
          chmod +x bin/usign
          sudo cp bin/usign /usr/local/bin/usign
          echo "Verifying usign installation:"
          usign

      - name: Make Scripts Executable
        run: |
          chmod +x core/*.sh ui/*.sh

      - name: Run DayPass Orchestrator
        run: |
          ./core/orchestrator.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}